apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamodb-admin-deployment
  labels:
    com.job.service: dynamodb-admin
spec:
  selector:
    matchLabels:
      com.job.service: dynamodb-admin
  replicas: 1
  template:
    metadata:
      labels:
        com.job.service: dynamodb-admin
    spec:
      serviceAccountName: default
      containers:
      - name: dynamodb-local
        image: aaronshaf/dynamodb-admin
        env:            
          - name: DYNAMO_ENDPOINT
            value: "http://localstack-service:4566"
          - name: AWS_REGION
            value: "us-east-1"
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: aws-secrets
                key: AWS_ACCESS_KEY_ID 
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: aws-secrets
                key: AWS_SECRET_ACCESS_KEY       
        ports:
        - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: dynamodb-admin-service
  labels:
    com.job.service: dynamodb-admin-service
spec:
  type: NodePort
  ports:
  - port: 8001
    targetPort: 8001
    nodePort: 30005
  selector:
    com.job.service: dynamodb-admin
